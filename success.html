<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Success</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2.5rem;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 420px;
    }
    .checkmark { font-size: 4rem; }
    h1 {
      color: #27ae60;
      margin: 1rem 0 0.5rem;
      font-size: 1.6rem;
    }
    p { color: #555; margin-bottom: 1.5rem; }
    a {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background: #4a90e2;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.95rem;
    }
    a:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✅</div>
    <h1>Data submitted successfully</h1>
    <p>Your information has been saved to MongoDB Atlas.</p>
    <a href="/">← Submit Another</a>
  </div>
</body>
</html>
