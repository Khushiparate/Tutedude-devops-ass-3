<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Data</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: #fff;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
    }
    h1 { color: #333; margin-bottom: 1.5rem; text-align: center; }
    label { display: block; margin-bottom: 0.3rem; font-weight: bold; color: #555; }
    input, textarea {
      width: 100%;
      padding: 0.65rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    input:focus, textarea:focus { outline: none; border-color: #4a90e2; }
    textarea { resize: vertical; min-height: 100px; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #4a90e2;
      color: #fff;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    .error {
      background: #ffe0e0;
      color: #c0392b;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      border: 1px solid #f5c6cb;
    }
    .api-link {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .api-link a { color: #4a90e2; text-decoration: none; }
    .api-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Data Submission Form</h1>

    {% if error %}
      <div class="error">⚠️ {{ error }}</div>
    {% endif %}

    <form action="/submit" method="POST">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required />

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Enter your message" required></textarea>

      <button type="submit">Submit</button>
    </form>

    <div class="api-link">
      <a href="/api" target="_blank">📡 View /api JSON data</a>
    </div>
  </div>
</body>
</html>
